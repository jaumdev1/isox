global {
    workers         8;
    log_level       info;
    log_file        /var/log/iso8583router/router.log;
    metrics_port    9090;
}

downstream mip_mastercard {
    addr                  127.0.0.1:8583;
    length_header         4;
    length_encoding       bcd;
    reconnect_interval_ms 5000;

    heartbeat {
        interval_ms   30000;
        timeout_ms    5000;
        mti           "0800";
        de[70]        "301";
    }
}

upstream authorizer_stable {
    url        http://127.0.0.1:8080/authorize;
    timeout_ms 20000;

    request_mapping {
        mti     -> body.mti;
        de[2]   -> body.pan;
        de[3]   -> body.processing_code;
        de[4]   -> body.amount;
        de[11]  -> body.stan;
        de[12]  -> body.local_time;
        de[13]  -> body.local_date;
        de[41]  -> body.terminal_id;
        de[42]  -> body.merchant_id;
        de[49]  -> body.currency_code;
    }

    response_mapping {
        body.response_code -> de[39];
        body.auth_code     -> de[38];
    }
}

upstream authorizer_canary {
    url        http://127.0.0.1:8081/authorize;
    timeout_ms 20000;

    request_mapping {
        mti     -> body.mti;
        de[2]   -> body.pan;
        de[3]   -> body.processing_code;
        de[4]   -> body.amount;
        de[11]  -> body.stan;
        de[12]  -> body.local_time;
        de[13]  -> body.local_date;
        de[41]  -> body.terminal_id;
        de[42]  -> body.merchant_id;
        de[49]  -> body.currency_code;
    }

    response_mapping {
        body.response_code -> de[39];
        body.auth_code     -> de[38];
    }
}

route {
    match mti == "0800" {
        action  echo;
        de[39]  "00";
    }

    default {
        upstream authorizer_stable weight 90;
        upstream authorizer_canary weight 10;
    }
}
